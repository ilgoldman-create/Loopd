<meta name="apple-mobile-web-app-capable" content="yes"/>

<title>Loopd — stay in the loop with your village</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#FAF8FF;color:#1a1a1a;font-size:15px;overscroll-behavior:none;}
.app{max-width:780px;margin:0 auto;padding:1rem;padding-bottom:calc(1rem + env(safe-area-inset-bottom));padding-top:calc(1rem + env(safe-area-inset-top));}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #C9A8E8;}
.logo-tag{font-size:12px;color:var(--color-text-secondary);margin-left:4px;}.user-chip{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;background:#F0E8FF;cursor:pointer;border:1px solid #C9A8E8;margin-left:auto;}
.user-chip span{font-size:13px;font-weight:500;color:#3D1A6E;}
.nav{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap;}
.nav-btn{padding:7px 16px;border-radius:999px;border:1.5px solid #e0e0e0;font-size:13px;font-weight:500;cursor:pointer;background:#fff;color:#666;transition:all 0.15s;}
.nav-btn.active{background:#8B5CC8;color:white;border-color:#8B5CC8;}
.nav-btn:hover:not(.active){border-color:#8B5CC8;color:#3D1A6E;}
.card{background:#fff;border:1px solid #C9A8E8;border-radius:14px;padding:1.25rem;margin-bottom:1rem;}
.section-title{font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:1rem;}
.pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:500;}
.pill-red{background:#F0E8FF;color:#3D1A6E;}
.pill-amber{background:#FAEEDA;color:#633806;}
.pill-teal{background:#E1F5EE;color:#085041;}
.pill-coral{background:#F5EEFF;color:#6B3FA0;}
.pill-pink{background:#EDE0FF;color:#4A1A8C;}
.pill-gray{background:#f5f5f5;color:#666;}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0;}
.event-row{display:flex;align-items:start;gap:12px;padding:10px 0;border-bottom:1px solid #EDE0FF;}
.event-row:last-child{border-bottom:none;}
.days-col{width:48px;text-align:center;flex-shrink:0;}
.days-num{font-size:22px;font-weight:600;line-height:1;}
.days-lbl{font-size:10px;color:#999;}
.event-info{flex:1;min-width:0;}
.event-name{font-size:14px;font-weight:500;}
.event-meta{font-size:12px;color:#666;margin-top:2px;}
.tag-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
.away-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;margin-bottom:6px;font-size:13px;}
.away-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.friend-card{background:#fff;border:1px solid #C9A8E8;border-radius:12px;padding:1rem;margin-bottom:10px;}
.friend-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.gift-progress{height:6px;background:#EDE0FF;border-radius:999px;overflow:hidden;margin:8px 0;}
.gift-fill{height:6px;background:#8B5CC8;border-radius:999px;}
.contrib-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #EDE0FF;}
.contrib-row:last-child{border-bottom:none;}
.check{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.check-yes{background:#E1F5EE;color:#085041;}
.check-no{background:#f5f5f5;color:#bbb;}
input,select,textarea{width:100%;padding:9px 12px;border:1px solid #C9A8E8;border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:#1a1a1a;outline:none;margin-top:4px;}
input:focus,select:focus,textarea:focus{box-shadow:0 0 0 2px #C9A8E8;border-color:#8B5CC8;}
input[type=file]{border:none;padding:0;}
label{font-size:12px;color:#666;display:block;margin-top:12px;}
.btn{padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;transition:all 0.15s;}
.btn-primary{background:#8B5CC8;color:white;}
.btn-primary:hover{background:#3D1A6E;}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-outline{background:transparent;border:1px solid #ddd;color:#666;}
.btn-outline:hover{border-color:#8B5CC8;color:#3D1A6E;}
.empty{text-align:center;padding:2rem;color:#999;font-size:13px;}
.thankyou-card{background:#F0E8FF;border-radius:10px;padding:1rem;margin-top:12px;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center;padding:1rem;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:16px;padding:1.5rem;width:100%;max-width:500px;border:1px solid #C9A8E8;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:600;margin-bottom:1rem;}
.grid2{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;}
.stat{background:#F0E8FF;border-radius:8px;padding:5px 12px;text-align:center;flex:1;min-width:60px;}
.stat-num{font-size:16px;font-weight:600;color:#8B5CC8;}
.stat-lbl{font-size:10px;color:#6B3FA0;}
.req-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #EDE0FF;}
.req-row:last-child{border-bottom:none;}
.badge{background:#8B5CC8;color:white;border-radius:999px;padding:1px 7px;font-size:11px;margin-left:5px;}
summary{cursor:pointer;font-size:13px;color:#999;padding:8px 0;user-select:none;}
.bcard-section{background:#D8E8D8;border:1px solid #A8C4A8;border-radius:18px;padding:1.25rem;margin-top:14px;position:relative;}
.bcard-title{font-family:'Caveat',cursive;font-size:17px;font-weight:700;color:#0E2010;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.bcard-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;margin-bottom:12px;}
.bcard-msg{background:#FDF5F0;border-radius:2px;padding:12px 12px 28px;transform:rotate(var(--rot,0deg));position:relative;box-shadow:3px 4px 10px rgba(0,0,0,0.16);}
.bcard-msg::after{content:'';position:absolute;bottom:0;right:0;width:20px;height:20px;background:linear-gradient(225deg,transparent 50%,rgba(0,0,0,0.11) 50%);border-top-left-radius:3px;}
.bcard-msg::before{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;background:rgba(0,0,0,0.20);}
.bcard-lines{position:absolute;inset:34px 8px 24px;background-repeating-linear-gradient(to bottom,transparent,transparent 22px,rgba(0,0,0,0.07) 22px,rgba(0,0,0,0.07) 23px);pointer-events:none;}
.bcard-author{font-family:'Caveat',cursive;font-size:15px;font-weight:700;color:#5C2018;margin-bottom:8px;position:relative;}
.bcard-text{font-family:'Caveat',cursive;font-size:15px;color:#3A1810;line-height:1.6;position:relative;}
.bcard-img{width:100%;border-radius:4px;margin-top:8px;object-fit:cover;max-height:90px;position:relative;}
.bcard-locked{background:rgba(255,255,255,0.5);border:1px dashed #A8C4A8;border-radius:10px;padding:1.25rem;text-align:center;color:#3A5838;font-size:13px;}
.bcard-add-btn{width:100%;border:1.5px dashed #A8C4A8;color:#0E2010;background:rgba(255,255,255,0.5);border-radius:10px;padding:12px;font-size:15px;cursor:pointer;font-family:'Caveat',cursive;font-weight:700;transition:all 0.15s;}
.bcard-add-btn:hover{background:rgba(255,255,255,0.8);}
.bcard-footer{font-family:'Caveat',cursive;font-size:13px;color:#3A5838;text-align:center;padding-top:10px;border-top:1px dashed #A8C4A8;margin-top:4px;}
.bcard-reveal-wrap{text-align:center;padding:0.5rem 0 1rem;}
.bcard-reveal-wrap .big-emoji{font-size:36px;display:block;margin-bottom:6px;}
@keyframes confetti-fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(60px) rotate(360deg);opacity:0;}}
.confetti-dot{position:absolute;width:8px;height:8px;border-radius:50%;animation:confetti-fall 1.2s ease-in forwards;pointer-events:none;}
.img-preview{width:100%;border-radius:8px;margin-top:8px;max-height:130px;object-fit:cover;display:none;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">

    <div class="logo-tag">· stay in the loop with your village</div>
    <div class="user-chip" onclick="openModal('user-modal')">
      <div class="avatar" style="width:24px;height:24px;font-size:11px;background:#F0E8FF;color:#3D1A6E;" id="top-av">IL</div>
      <span id="top-name">Ilana</span>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showTab('feed',this)">📅 Upcoming</button>
    <button class="nav-btn" onclick="showTab('village',this)">👨‍👩‍👧 Village</button>
    <button class="nav-btn" onclick="showTab('gifts',this)">🎁 Gifts</button>
    <button class="nav-btn" onclick="showTab('add',this)">+ Add event</button>

<div class="modal-bg" id="join-gift-modal">
  <div class="modal">
    <div id="join-gift-step1">
      <div class="modal-title">🎁 Join the group gift</div>
      <div id="jg-for" style="font-size:13px;color:#666;margin-bottom:16px;"></div>
      <input type="hidden" id="jg-gi"/>
      <label>Your contribution ($)</label>
      <input type="number" id="jg-amount" placeholder="e.g. 20" min="1"/>
      <div id="jg-suggestion" style="font-size:12px;color:#085041;background:#E1F5EE;padding:7px 11px;border-radius:8px;margin-top:8px;display:none;"></div>
      <div id="jg-pay-row" style="margin-top:12px;">
        <label>Pay via</label>
        <select id="jg-pay"><option>PayID</option><option>PayPal</option><option>Bank transfer</option></select>
        <div id="jg-pay-detail" style="font-size:12px;color:#999;margin-top:6px;padding:8px;background:#f9f9f9;border-radius:8px;"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:16px;">
        <button class="btn btn-primary" onclick="joinGiftStep2()">Next — add your card message →</button>
        <button class="btn btn-outline" onclick="closeModal('join-gift-modal')">Cancel</button>
      </div>
    </div>
    <div id="join-gift-step2" style="display:none;">
      <div class="modal-title">✉️ Add your message to the card</div>
      <div id="jg-card-for" style="font-size:13px;color:#666;margin-bottom:12px;"></div>
      <textarea id="jg-msg" style="height:100px;" placeholder="Write something lovely for the birthday kid..."></textarea>
      <label style="margin-top:12px;">Add a photo (optional)</label>
      <input type="file" id="jg-photo" accept="image/*" onchange="previewJgImg(this)" style="border:none;padding:0;margin-top:4px;"/>
      <img id="jg-preview" style="display:none;width:100%;border-radius:8px;margin-top:8px;max-height:130px;object-fit:cover;"/>
      <div style="display:flex;gap:8px;margin-top:16px;">
        <button class="btn btn-primary" onclick="confirmJoinGift()">Confirm — I'm in! 🎉</button>
        <button class="btn btn-outline" onclick="backToStep1()">← Back</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-bg" id="thankyou-modal">
  <div class="modal">
    <div class="modal-title">💛 Send a group thank you</div>
    <input type="hidden" id="ty-gi"/>
    <div id="ty-for" style="font-size:13px;color:#666;margin-bottom:12px;"></div>
    <textarea id="ty-msg" style="height:90px;" placeholder="Write a thank you from your family to everyone who contributed..."></textarea>
    <label style="margin-top:12px;">Add a photo (optional — show them the happy birthday kid!)</label>
    <input type="file" id="ty-photo" accept="image/*" onchange="previewTyImg(this)" style="border:none;padding:0;margin-top:4px;"/>
    <img id="ty-preview" style="display:none;width:100%;border-radius:8px;margin-top:8px;max-height:130px;object-fit:cover;"/>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn btn-primary" onclick="sendThankyou()">Send thank you 💛</button>
      <button class="btn btn-outline" onclick="closeModal('thankyou-modal')">Cancel</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="invite-modal">
  <div class="modal">
    <div class="modal-title">Invite someone to your village</div>
    <label>Their name</label><input type="text" id="inv-name" placeholder="e.g. Emma Davies"/>
    <label>Their email</label><input type="text" id="inv-email" placeholder="e.g. emma@email.com"/>
    <label>Visibility</label>
    <select id="inv-vis"><option value="full">Full access</option><option value="limited">Limited view</option></select>
    <p style="font-size:12px;color:#999;margin-top:8px;">They'll get a link to join and set up their own family profile.</p>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn btn-primary" onclick="sendInvite()">Send invite</button>
      <button class="btn btn-outline" onclick="closeModal('invite-modal')">Cancel</button>
    </div>
  </div>
</div>



<div class="modal-bg" id="attending-modal">
  <div class="modal">
    <div class="modal-title">Are you attending?</div>
    <input type="hidden" id="att-eid"/>
    <div id="att-event-info" style="font-size:13px;color:#666;margin-bottom:16px;padding:10px 12px;background:#F0E8FF;border-radius:8px;"></div>
    <label>Adults coming</label>
    <div style="display:flex;align-items:center;gap:12px;margin-top:8px;">
      <button class="btn btn-outline btn-sm" onclick="adjustAtt('adults',-1)" style="width:32px;padding:4px;">–</button>
      <span id="att-adults-val" style="font-size:18px;font-weight:600;color:#3D1A6E;min-width:24px;text-align:center;">1</span>
      <button class="btn btn-outline btn-sm" onclick="adjustAtt('adults',1)" style="width:32px;padding:4px;">+</button>
    </div>
    <label style="margin-top:14px;">Kids coming</label>
    <div style="display:flex;align-items:center;gap:12px;margin-top:8px;">
      <button class="btn btn-outline btn-sm" onclick="adjustAtt('kids',-1)" style="width:32px;padding:4px;">–</button>
      <span id="att-kids-val" style="font-size:18px;font-weight:600;color:#3D1A6E;min-width:24px;text-align:center;">0</span>
      <button class="btn btn-outline btn-sm" onclick="adjustAtt('kids',1)" style="width:32px;padding:4px;">+</button>
    </div>
    <div style="display:flex;gap:8px;margin-top:20px;">
      <button class="btn btn-primary" onclick="saveAttending()">Confirm attending</button>
      <button class="btn btn-outline" onclick="removeAttending()">Can't make it</button>
      <button class="btn btn-outline" onclick="closeModal('attending-modal')">Cancel</button>
    </div>
  </div>
</div>
  <div class="modal">
    <div class="modal-title">Who are you?</div>
    <div id="user-chips" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;"></div>

      <input type="text" id="nu-name" placeholder="Add your name..." style="flex:1;margin-top:0;"/>
      <button class="btn btn-primary btn-sm" onclick="addNewUser()">Add</button>
    </div>
    <button class="btn btn-primary" onclick="confirmUser()">Confirm</button>
  </div>
</div>

  ],
  gifts:[{
    id:1,forChild:'Lily Thompson',firstName:'Lily',idea:null,
    linkedEventId:1,organiser:null,
    contributors:[{name:'Meg',paid:true,amount:25},{name:'Tom',paid:true,amount:20}],
    closed:false,thankYou:null,thankYouImg:null,
    card:{revealed:false,messages:[
      {author:'Meg',text:'Happy birthday Lily! 🦄 Hope your day is as magical as you are!',img:null},
      {author:'Tom',text:'Have the best birthday ever gorgeous girl! From the Williams family xx',img:null},
    ]}
  }]
};

function days(d){const t=new Date();t.setHours(0,0,0,0);const x=new Date(d);x.setHours(0,0,0,0);return Math.round((x-t)/86400000);}
function fmt(d){return new Date(d).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});}
function inits(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function av(name,size,ci){const i=ci!==undefined?ci:([...name].reduce((a,c)=>a+c.charCodeAt(0),0)%6);return `<div class="avatar" style="width:${size}px;height:${size}px;background:${ABGS[i]};color:${ATXS[i]};font-size:${Math.round(size*0.33)}px;">${inits(name)}</div>`;}

const CIRCLES={family:{label:'Family',bg:'#F0E8FF',color:'#3D1A6E'},friends:{label:'Friends',bg:'#E1F5EE',color:'#085041'},extended:{label:'Extended family',bg:'#EEEDFE',color:'#3C3489'}};
function circlePill(c){const x=CIRCLES[c]||CIRCLES['friends'];return `<span class="pill" style="background:${x.bg};color:${x.color};">${x.label}</span>`;}

const NOTE_ROTS=['-2.5deg','2deg','-1.8deg','2.5deg','-2deg','1.5deg','-1.5deg','2.2deg'];
const VIS_LABEL={'family':'👨‍👩‍👧 Family','close-friends':'💜 Close friends','extended':'🌐 Extended','link':'🔗 Link','full':'All friends','loose':'General','unavailable':'Private'};

function noteCards(msgs, showYours){
  let m=`<div class="bcard-grid">`;
  msgs.forEach((msg,mi)=>{
    const rot=NOTE_ROTS[mi%NOTE_ROTS.length];
    const isYours=msg.author===S.me;
    m+=`<div class="bcard-msg" style="--rot:${rot};">
      <div class="bcard-lines"></div>
      <div class="bcard-author">${msg.author}</div>
      <div class="bcard-text">${msg.text}</div>
      ${msg.img?`<img src="${msg.img}" class="bcard-img"/>`:''}
      ${isYours&&showYours?`<div style="font-family:'Caveat',cursive;font-size:12px;color:#A87060;margin-top:6px;position:relative;">your message ✏️</div>`:''}
    </div>`;
  });
  m+=`</div>`;
  return m;
}

function cardSection(g,gi){
  const isOrg=g.organiser===S.me;
  const msgs=g.card.messages;
  const myMsg=msgs.find(m=>m.author===S.me);
  const total=g.contributors.length;
  const firstName=g.forChild.split(' ')[0];
  let h=`<div class="bcard-section" id="bcard-${gi}">
    <div class="bcard-title">✉️ Birthday card for ${firstName} <span style="font-size:12px;background:rgba(255,255,255,0.5);color:#0E2010;padding:2px 9px;border-radius:999px;margin-left:auto;font-family:inherit;">${msgs.length} / ${total}</span></div>`;

  if(g.card.revealed){
    h+=`<div style="text-align:center;margin-bottom:12px;"><div style="font-size:32px;">🎉</div><div style="font-family:'Caveat',cursive;font-size:16px;font-weight:700;color:#0E2010;margin-top:4px;">Card shared with ${firstName}'s family!</div></div>`;
    h+=noteCards(msgs,false);
    h+=`<div class="bcard-footer">wishing you a great year ahead 💛</div>`;
  } else if(g.closed&&isOrg){
    h+=`<div style="text-align:center;margin-bottom:12px;"><div style="font-size:28px;">🎁</div><div style="font-family:'Caveat',cursive;font-size:16px;font-weight:700;color:#0E2010;margin-top:4px;">Pool closed — ${msgs.length} messages ready!</div><div style="font-size:12px;color:#3A5838;margin-top:2px;">Preview below, share when ready</div></div>`;
    h+=noteCards(msgs,false);
    h+=`<div class="bcard-footer">wishing you a great year ahead 💛</div>`;
    h+=`<button class="btn btn-primary" style="width:100%;margin-top:12px;font-size:15px;padding:12px;" onclick="revealCard(${gi})">🎉 Share card with ${firstName}'s family</button>`;
  } else if(g.closed&&!isOrg){
    h+=`<div class="bcard-locked">🔒 ${firstName}'s card is sealed — the organiser will share it soon!</div>`;
  } else {
    if(msgs.length>0) h+=noteCards(msgs,true);
    else h+=`<div style="text-align:center;padding:1rem 0 0.5rem;font-size:26px;">🎈</div><div style="font-family:'Caveat',cursive;text-align:center;font-size:15px;color:#3A5838;margin-bottom:12px;">No messages yet — be the first to write!</div>`;
    if(!myMsg){
      h+=`<button class="bcard-add-btn" onclick="openCardModal(${gi})">✏️ Write your message for ${firstName}</button>`;
    } else {
      const rem=total-msgs.length;
      h+=`<div style="font-family:'Caveat',cursive;font-size:14px;background:rgba(255,255,255,0.7);color:#0E2010;padding:8px 12px;border-radius:8px;margin-top:10px;text-align:center;">✓ Your message is in! ${rem>0?`Waiting for ${rem} more...`:'Everyone has written — card is complete 🎉'}</div>`;
    }
    h+=`<div style="font-family:'Caveat',cursive;font-size:12px;color:#3A5838;margin-top:8px;text-align:center;opacity:0.7;">Hidden from ${firstName}'s family until the pool closes.</div>`;
  }
  h+=`</div>`;
  return h;
}

function revealCard(gi){
  S.gifts[gi].card.revealed=true;
  renderGifts();
}

function renderFeed(){
  const sorted=[...S.events].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const up=sorted.filter(e=>days(e.date)>=-1&&e.type!=='trip');
  const upBdays=up.filter(e=>e.type==='birthday');
  const upPreg=up.filter(e=>e.type==='pregnancy');
  const upEvents=up.filter(e=>e.type!=='birthday'&&e.type!=='pregnancy');
  const past=sorted.filter(e=>days(e.date)<-1&&e.type!=='trip');
  let h=`<div class="grid2">
    <div class="stat"><div class="stat-num">${up.length}</div><div class="stat-lbl">upcoming</div></div>
    <div class="stat"><div class="stat-num">${S.friends.length}</div><div class="stat-lbl">in your village</div></div>
    <div class="stat"><div class="stat-num">${S.gifts.filter(g=>!g.closed).length}</div><div class="stat-lbl">gift pools open</div></div>
    <div class="stat"><div class="stat-num">${S.requests.filter(r=>r.status==='pending').length}</div><div class="stat-lbl">pending requests</div></div>
  </div>`;

  function weeksAlong(dueDateStr){
    const due=new Date(dueDateStr);due.setHours(0,0,0,0);
    const today=new Date();today.setHours(0,0,0,0);
    const daysLeft=Math.round((due-today)/86400000);
    const totalDays=280;
    const daysPregnant=totalDays-daysLeft;
    return Math.max(1,Math.min(42,Math.round(daysPregnant/7)));
  }

  function eventRows(events){
    let r='';
    events.forEach(e=>{
      const d=days(e.date);
      const dc=d<=0?'#8B5CC8':d<=7?'#BA7517':'#999';
      const myAttendance=e.attendees&&e.attendees.find(a=>a.name===S.me);
      const totalAdults=(e.attendees||[]).reduce((s,a)=>s+(a.adults||0),0);
      const totalKids=(e.attendees||[]).reduce((s,a)=>s+(a.kids||0),0);
      const isTrip=e.type==='trip';
      const isPreg=e.type==='pregnancy';
      const nameDisplay=e.child?e.child:e.family;

      if(isPreg){
        const wks=weeksAlong(e.date);
        const pct=Math.round(wks/40*100);
        r+=`<div class="event-row">
          <div class="days-col"><div class="days-num" style="color:#8B5CC8;">${d<0?'–':d}</div><div class="days-lbl">${d<0?'ago':'days'}</div></div>
          <div style="width:38px;height:38px;border-radius:50%;background:#EDE0FF;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;">🤰</div>
          <div class="event-info">
            <div class="event-name">${e.family} <span style="font-weight:400;color:#999;">· baby on the way!</span></div>
            <div class="event-meta">Due ${fmt(e.date)} ${e.note?'· '+e.note:''}</div>
            <div style="margin-top:6px;">
              <div style="display:flex;justify-content:space-between;font-size:11px;color:#6B3FA0;margin-bottom:3px;"><span>Week ${wks} of 40</span><span>${pct}%</span></div>
              <div style="height:5px;background:#EDE0FF;border-radius:999px;overflow:hidden;"><div style="height:5px;background:#8B5CC8;border-radius:999px;width:${pct}%;"></div></div>
            </div>
            <div class="tag-row"><span class="pill pill-pink">Baby on the way</span>${e.visibility?`<span class="pill pill-gray" style="font-size:10px;">${VIS_LABEL[e.visibility]||''}</span>`:''}</div>
          </div>
        </div>`;
        return;
      }

      r+=`<div class="event-row">
        <div class="days-col"><div class="days-num" style="color:${dc};">${d<0?'–':d}</div><div class="days-lbl">${d<0?'ago':'days'}</div></div>
        ${av(nameDisplay,38)}
        <div class="event-info">
          <div class="event-name">${TEMOJI[e.type]} ${nameDisplay} <span style="font-weight:400;color:#999;">· ${e.family}</span></div>
          <div class="event-meta">${fmt(e.date)}${e.dateEnd?' – '+fmt(e.dateEnd):''} ${e.note?'· '+e.note:''}</div>
          ${e.location?`<div style="font-size:12px;color:#8B5CC8;margin-top:3px;">📍 ${e.location}</div>`:''}
          <div class="tag-row">
            <span class="pill ${TPILL[e.type]}">${TLABEL[e.type]}</span>
            ${e.visibility?`<span class="pill pill-gray" style="font-size:10px;">${VIS_LABEL[e.visibility]||''}</span>`:''}
            ${totalAdults>0?`<span class="pill pill-gray" style="font-size:10px;">👤 ${totalAdults} adult${totalAdults!==1?'s':''} · 🧒 ${totalKids} kid${totalKids!==1?'s':''}</span>`:''}
          </div>
        </div>
        ${!isTrip?`<button class="btn btn-sm ${myAttendance?'btn-primary':'btn-outline'}" style="${myAttendance?'':'border-color:#8B5CC8;color:#8B5CC8;'}" onclick="openAttending(${e.id})">${myAttendance?'✓ Going':'Attending?'}</button>`:''}
      </div>`;
    });
    return r;
  }

  if(upBdays.length){
    h+=`<div class="card"><div class="section-title">🎂 Birthdays coming up</div>${eventRows(upBdays)}</div>`;
  }
  if(upPreg.length){
    h+=`<div class="card"><div class="section-title">🤰 Babies on the way</div>${eventRows(upPreg)}</div>`;
  }
  if(upEvents.length){
    h+=`<div class="card"><div class="section-title">📌 Events & milestones</div>${eventRows(upEvents)}</div>`;
  }
  if(!upBdays.length&&!upEvents.length){
    h+=`<div class="card"><div style="text-align:center;padding:1.5rem;color:#999;font-size:13px;">Nothing coming up — add some events!</div></div>`;
  }

  const awayFriends=S.friends.filter(f=>{
    const ae=S.events.find(e=>e.type==='trip'&&e.author===f.name);
    return ae&&((days(ae.date)<=0&&days(ae.dateEnd||ae.date)>=0)||(days(ae.date)>0&&days(ae.date)<=21));
  });
  if(awayFriends.length){
    h+=`<div class="card"><div class="section-title">🏖️ Not around</div>`;
    S.friends.forEach(f=>{
      const ae=S.events.find(e=>e.type==='trip'&&e.author===f.name);
      const isAway=ae&&days(ae.date)<=0&&days(ae.dateEnd||ae.date)>=0;
      const soon=ae&&days(ae.date)>0&&days(ae.date)<=21;
      if(!isAway&&!soon)return;
      const dot=isAway?'#8B5CC8':'#BA7517';
      const bg=isAway?'#F0E8FF':'#FAEEDA';
      const lbl=isAway?'not around':`not around from ${fmt(ae.date)}`;
      const detail=ae&&f.visibility==='full'&&ae.note?` · ${ae.note}`:'';
      h+=`<div class="away-bar" style="background:${bg};"><div class="away-dot" style="background:${dot};"></div>${av(f.name,26,f.ci)}<span style="font-weight:500;">${f.name.split(' ')[0]}</span><span style="font-size:12px;color:#666;">${lbl}${detail}</span></div>`;
    });
    h+=`</div>`;
  }

  if(past.length){
    h+=`<details><summary>Show ${past.length} past events</summary><div class="card" style="margin-top:8px;opacity:0.65;">`;
    past.forEach(e=>{h+=`<div class="event-row"><div style="width:48px;font-size:11px;color:#999;">${fmt(e.date)}</div><div style="font-size:13px;color:#666;">${TEMOJI[e.type]} ${e.child} · ${e.family}</div></div>`;});
    h+=`</div></details>`;
  }
  document.getElementById('tab-feed').innerHTML=h;
}

function renderVillage(){
  let h=`<div class="card"><div class="section-title">Your village — ${S.friends.length} families</div>`;
  S.friends.forEach(f=>{
    const fe=S.events.filter(e=>e.author===f.name);
    h+=`<div class="friend-card"><div class="friend-header">${av(f.name,44,f.ci)}<div><div style="font-size:15px;font-weight:600;">${f.name}</div><div style="font-size:12px;color:#999;margin-top:2px;">Kids: ${f.kids.map(k=>k.name).join(', ')||'not added yet'}</div><div style="margin-top:5px;display:flex;gap:5px;">${circlePill(f.circle||'friends')}<span class="pill ${f.visibility==='full'?'pill-teal':'pill-gray'}">${f.visibility==='full'?'Full access':'Limited view'}</span></div></div></div>`;
    f.kids.forEach(k=>{
      const dob=new Date(k.dob);const now=new Date();
      let age=now.getFullYear()-dob.getFullYear();
      if(now<new Date(now.getFullYear(),dob.getMonth(),dob.getDate()))age--;
      const nb=new Date(now.getFullYear(),dob.getMonth(),dob.getDate());
      if(nb<now)nb.setFullYear(now.getFullYear()+1);
      h+=`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid #EDE0FF;"><div style="font-size:13px;font-weight:500;flex:1;">${k.name}</div><span class="pill pill-gray">${age}y old</span><span class="pill pill-red">🎂 ${Math.round((nb-now)/86400000)}d</span></div>`;
    });
    if(fe.length){h+=`<div style="margin-top:8px;padding-top:8px;border-top:1px solid #EDE0FF;">`;fe.slice(0,3).forEach(e=>{h+=`<div style="font-size:12px;color:#666;padding:3px 0;">${TEMOJI[e.type]} ${e.child} · ${fmt(e.date)}</div>`;});h+=`</div>`;}
    h+=`</div>`;
  });
  h+=`<button class="btn btn-outline" style="width:100%;margin-top:8px;" onclick="openModal('invite-modal')">+ Invite someone to your village</button></div>`;
  document.getElementById('tab-village').innerHTML=h;
}

function renderGifts(){
  // Find upcoming birthdays within next 30 days that have a gift pool
  const upcomingBdays=S.events
    .filter(e=>e.type==='birthday'&&days(e.date)>=0&&days(e.date)<=30)
    .sort((a,b)=>new Date(a.date)-new Date(b.date));

  // Auto-create gift pools for upcoming birthdays that don't have one yet
  upcomingBdays.forEach(e=>{
    if(!S.gifts.find(g=>g.linkedEventId===e.id)){
      S.gifts.push({
        id:Date.now()+Math.random(),
        forChild:e.child+' ('+e.family+')',
        firstName:e.child,
        idea:null,
        linkedEventId:e.id,
        organiser:null,
        contributors:[],
        closed:false,
        thankYou:null,
        thankYouImg:null,
        card:{revealed:false,messages:[]}
      });
    }
  });

  let h='';

  // Active gift pools — birthdays in next 30 days
  const activePools=S.gifts.filter(g=>{
    const le=S.events.find(e=>e.id===g.linkedEventId);
    return le&&days(le.date)>=0&&days(le.date)<=30&&!g.closed;
  });

  // Closed pools needing thank you
  const needsThanks=S.gifts.filter(g=>g.closed&&!g.thankYou);

  // Completed pools
  const completed=S.gifts.filter(g=>g.closed&&g.thankYou);

  if(!activePools.length&&!needsThanks.length&&!completed.length){
    h+=`<div class="card" style="text-align:center;padding:2rem;">
      <div style="font-size:32px;margin-bottom:8px;">🎂</div>
      <div style="font-size:15px;font-weight:500;color:#1a1a1a;margin-bottom:4px;">No upcoming birthdays this month</div>
      <div style="font-size:13px;color:#999;">Group gifts will appear here automatically when a birthday is 30 days away.</div>
    </div>`;
  }

  if(activePools.length){
    h+=`<div style="font-size:12px;font-weight:600;color:#999;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px;">Upcoming group gifts</div>`;
    activePools.forEach(g=>{
      const le=S.events.find(e=>e.id===g.linkedEventId);
      const d=le?days(le.date):null;
      const myContrib=g.contributors.find(c=>c.name===S.me);
      const myCardMsg=g.card.messages.find(m=>m.author===S.me);
      const joinedGift=!!myContrib;
      const joinedCard=!!myCardMsg;
      const allDone=joinedGift&&joinedCard;
      const contributorCount=g.contributors.length;

      h+=`<div class="card" style="cursor:pointer;" onclick="openGiftPool(${g.id})">
        <div style="display:flex;align-items:center;gap:14px;">
          <div style="width:52px;height:52px;border-radius:50%;background:#F0E8FF;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">🎂</div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:16px;font-weight:600;color:#1a1a1a;">${g.firstName}'s birthday</div>
            <div style="font-size:13px;color:#666;margin-top:2px;">${le?fmt(le.date):''} · ${d===0?'today!':d===1?'tomorrow':`in ${d} days`}</div>
            <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;">
              ${allDone
                ?`<span class="pill pill-teal">✓ You're in</span>`
                :joinedGift&&!joinedCard
                  ?`<span class="pill pill-amber">✏️ Add your card message</span>`
                  :`<span class="pill pill-red">Join the group gift</span>`}
              ${contributorCount>0?`<span class="pill pill-gray">${contributorCount} joining</span>`:''}
            </div>
          </div>
          <div style="font-size:20px;color:#ddd;">›</div>
        </div>
      </div>`;
    });
  }

  if(needsThanks.length){
    h+=`<div style="font-size:12px;font-weight:600;color:#999;letter-spacing:0.05em;text-transform:uppercase;margin:16px 0 8px;">Send a thank you</div>`;
    needsThanks.forEach(g=>{
      const le=S.events.find(e=>e.id===g.linkedEventId);
      const isBdayFamily=le&&le.author===S.me;
      if(!isBdayFamily)return;
      h+=`<div class="card" style="background:#FAF8FF;border-color:#C9A8E8;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="font-size:28px;">💛</div>
          <div style="flex:1;">
            <div style="font-size:15px;font-weight:600;">${g.firstName}'s gift was delivered!</div>
            <div style="font-size:13px;color:#666;margin-top:2px;">${g.contributors.length} people contributed. Time to send a thank you!</div>
          </div>
          <button class="btn btn-primary btn-sm" onclick="openThankyou(${g.id});event.stopPropagation();">Send thanks</button>
        </div>
      </div>`;
    });
  }

  if(completed.length){
    h+=`<details style="margin-top:8px;"><summary style="font-size:13px;color:#999;cursor:pointer;padding:6px 0;">Show ${completed.length} completed gift${completed.length!==1?'s':''}</summary>`;
    completed.forEach(g=>{
      h+=`<div class="card" style="margin-top:8px;opacity:0.7;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="font-size:24px;">🎉</div>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:600;">${g.firstName}'s birthday</div>
            <div style="font-size:12px;color:#666;margin-top:2px;">"${g.thankYou}"</div>
          </div>
        </div>
      </div>`;
    });
    h+=`</details>`;
  }

  document.getElementById('tab-gifts').innerHTML=h;
}

function openGiftPool(giftId){
  const gi=S.gifts.findIndex(g=>g.id===giftId);
  const g=S.gifts[gi];
  const le=S.events.find(e=>e.id===g.linkedEventId);
  const myContrib=g.contributors.find(c=>c.name===S.me);
  const myCardMsg=g.card.messages.find(m=>m.author===S.me);

  // If already joined gift but no card msg, jump to card step
  if(myContrib&&!myCardMsg){
    document.getElementById('jg-gi').value=gi;
    document.getElementById('join-gift-step1').style.display='none';
    document.getElementById('join-gift-step2').style.display='block';
    document.getElementById('jg-card-for').innerHTML=`Write a message for <strong>${g.firstName}</strong>'s birthday card 🎂`;
    document.getElementById('jg-msg').value='';
    document.getElementById('jg-preview').style.display='none';
    openModal('join-gift-modal');
    return;
  }

  // If all done, show summary
  if(myContrib&&myCardMsg){
    const d=le?days(le.date):null;
    const count=g.contributors.length;
    // Show a read-only summary card — reuse the gift pool view as an inline detail
    openGiftDetail(gi);
    return;
  }

  // Fresh join
  document.getElementById('jg-gi').value=gi;
  document.getElementById('jg-for').innerHTML=`<strong>${g.firstName}'s birthday</strong> · ${le?fmt(le.date):''}`;
  document.getElementById('jg-amount').value='';
  document.getElementById('jg-preview').style.display='none';
  document.getElementById('join-gift-step1').style.display='block';
  document.getElementById('join-gift-step2').style.display='none';

  // Suggestion based on avg of existing contributions
  const amounts=g.contributors.filter(c=>c.amount>0).map(c=>c.amount);
  const sugg=amounts.length>0?Math.round(amounts.reduce((a,b)=>a+b,0)/amounts.length):20;
  const suggBox=document.getElementById('jg-suggestion');
  if(amounts.length>0){
    suggBox.style.display='block';
    suggBox.textContent=`Others have been contributing around $${sugg} — but give whatever feels right!`;
    document.getElementById('jg-amount').value=sugg;
  } else {
    suggBox.style.display='none';
    document.getElementById('jg-amount').value=20;
  }

  // Pay detail
  document.getElementById('jg-pay').onchange=updatePayDetail;
  updatePayDetail();
  openModal('join-gift-modal');
}

function updatePayDetail(){
  const method=document.getElementById('jg-pay').value;
  const details={
    'PayID':'Send to: loopd@payments.au (once you confirm)',
    'PayPal':'Send to: @loopdapp (once you confirm)',
    'Bank transfer':'BSB: 123-456 · Acc: 987654 (once you confirm)'
  };
  document.getElementById('jg-pay-detail').textContent=details[method]||'';
}

function joinGiftStep2(){
  const amount=parseFloat(document.getElementById('jg-amount').value);
  if(!amount||amount<=0){alert('Please enter an amount.');return;}
  document.getElementById('join-gift-step1').style.display='none';
  document.getElementById('join-gift-step2').style.display='block';
  const gi=parseInt(document.getElementById('jg-gi').value);
  const g=S.gifts[gi];
  document.getElementById('jg-card-for').innerHTML=`Write a message for <strong>${g.firstName}</strong>'s birthday card 🎂`;
  document.getElementById('jg-msg').value='';
  document.getElementById('jg-preview').style.display='none';
}

function backToStep1(){
  document.getElementById('join-gift-step1').style.display='block';
  document.getElementById('join-gift-step2').style.display='none';
}

function previewJgImg(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{const img=document.getElementById('jg-preview');img.src=e.target.result;img.style.display='block';};
  r.readAsDataURL(file);
}

function confirmJoinGift(){
  const gi=parseInt(document.getElementById('jg-gi').value);
  const g=S.gifts[gi];
  const amount=parseFloat(document.getElementById('jg-amount').value)||20;
  const msg=document.getElementById('jg-msg').value.trim();
  if(!msg){alert('Please write a message for the card first!');return;}
  const prev=document.getElementById('jg-preview');
  const img=prev.style.display!=='none'?prev.src:null;

  // Add contributor
  if(!g.contributors.find(c=>c.name===S.me)){
    g.contributors.push({name:S.me,paid:true,amount});
  }
  // Add card message
  if(!g.card.messages.find(m=>m.author===S.me)){
    g.card.messages.push({author:S.me,text:msg,img});
  }

  closeModal('join-gift-modal');
  renderGifts();
  // Show confirmation
  setTimeout(()=>{
    alert(`You're in! 🎉 Your contribution and message have been added to ${g.firstName}'s group gift.`);
  },100);
}

function openGiftDetail(gi){
  const g=S.gifts[gi];
  const le=S.events.find(e=>e.id===g.linkedEventId);
  const count=g.contributors.length;
  const myMsg=g.card.messages.find(m=>m.author===S.me);
  alert(`You're all set for ${g.firstName}'s birthday 🎉\n\n${count} people have joined the group gift.\nYour card message: "${myMsg?myMsg.text:'(none yet)'}"`);
}

function openThankyou(giftId){
  const gi=S.gifts.findIndex(g=>g.id===giftId);
  const g=S.gifts[gi];
  document.getElementById('ty-gi').value=gi;
  document.getElementById('ty-for').innerHTML=`Send a thank you from <strong>${g.firstName}</strong>'s family to everyone who joined the group gift.`;
  document.getElementById('ty-msg').value='';
  document.getElementById('ty-preview').style.display='none';
  openModal('thankyou-modal');
}

function previewTyImg(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{const img=document.getElementById('ty-preview');img.src=e.target.result;img.style.display='block';};
  r.readAsDataURL(file);
}

function sendThankyou(){
  const gi=parseInt(document.getElementById('ty-gi').value);
  const msg=document.getElementById('ty-msg').value.trim();
  if(!msg){alert('Please write a thank you message!');return;}
  const prev=document.getElementById('ty-preview');
  const img=prev.style.display!=='none'?prev.src:null;
  S.gifts[gi].thankYou=msg;
  S.gifts[gi].thankYouImg=img;
  S.gifts[gi].closed=true;
  closeModal('thankyou-modal');
  renderGifts();
}

function closePool(gi){S.gifts[gi].closed=true;renderGifts();}
function markPaid(gi,ci){S.gifts[gi].contributors[ci].paid=true;renderGifts();}
function sendThanks(gi){const v=document.getElementById('ty-'+gi);if(v){const msg=v.value.trim();if(msg){S.gifts[gi].thankYou=msg;renderGifts();}}}

function renderAdd(){
  document.getElementById('tab-add').innerHTML=`<div class="card">
    <div class="section-title">Add an event to your village</div>
    <label>Your name</label><input type="text" id="a-author" value="${S.me}"/>
    <label>Child's name (optional)</label><input type="text" id="a-child" placeholder="e.g. Lily — or leave blank for family events"/>
    <label>Family name</label><input type="text" id="a-family" placeholder="e.g. Thompson family"/>
    <label>Event type</label>
    <select id="a-type">
      <option value="birthday">🎂 Birthday</option>
      <option value="pregnancy">🤰 Baby on the way</option>
      <option value="trip">🏖️ Not around / away</option>
      <option value="event">🎪 Event</option>
      <option value="milestone">⭐ Milestone</option>
      <option value="playdate">🛝 Playdate</option>
      <option value="other">📌 Other</option>
    </select>
    <label>Date</label><input type="date" id="a-date"/>
    <label>Location (optional)</label><input type="text" id="a-location" placeholder="e.g. 12 Rose St Fitzroy, or Zoom"/>
    <label>Note (optional)</label><input type="text" id="a-note" placeholder="e.g. Turning 6! Loves dinosaurs."/>
    <label>Who can see this?</label>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;" id="vis-grid">
      <div onclick="setVis('family')" id="vis-family" class="vis-chip" style="padding:10px 12px;border-radius:10px;cursor:pointer;border:1.5px solid #ddd;background:#f9f9f9;transition:all 0.15s;">
        <div style="font-size:13px;font-weight:600;color:#666;">👨‍👩‍👧 Family</div>
        <div style="font-size:11px;color:#999;margin-top:2px;">Only your family</div>
      </div>
      <div onclick="setVis('close-friends')" id="vis-close-friends" class="vis-chip" style="padding:10px 12px;border-radius:10px;cursor:pointer;border:1.5px solid #ddd;background:#f9f9f9;transition:all 0.15s;">
        <div style="font-size:13px;font-weight:600;color:#666;">💜 Close friends</div>
        <div style="font-size:11px;color:#999;margin-top:2px;">Your inner circle</div>
      </div>
      <div onclick="setVis('extended')" id="vis-extended" class="vis-chip" style="padding:10px 12px;border-radius:10px;cursor:pointer;border:1.5px solid #8B5CC8;background:#F0E8FF;transition:all 0.15s;">
        <div style="font-size:13px;font-weight:600;color:#3D1A6E;">🌐 Extended friends</div>
        <div style="font-size:11px;color:#6B3FA0;margin-top:2px;">All connections</div>
      </div>
      <div onclick="setVis('link')" id="vis-link" class="vis-chip" style="padding:10px 12px;border-radius:10px;cursor:pointer;border:1.5px solid #ddd;background:#f9f9f9;transition:all 0.15s;">
        <div style="font-size:13px;font-weight:600;color:#666;">🔗 Anyone with link</div>
        <div style="font-size:11px;color:#999;margin-top:2px;">Share the link widely</div>
      </div>
    </div>
    <input type="hidden" id="a-vis" value="extended"/>
    <div style="margin-top:16px;"><button class="btn btn-primary" onclick="addEvent()">Save event</button></div>
  </div>`;
}

function setVis(val){
  document.getElementById('a-vis').value=val;
  document.querySelectorAll('.vis-chip').forEach(el=>{
    const isSelected=el.id==='vis-'+val;
    el.style.border=isSelected?'1.5px solid #8B5CC8':'1.5px solid #ddd';
    el.style.background=isSelected?'#F0E8FF':'#f9f9f9';
    el.querySelector('div').style.color=isSelected?'#3D1A6E':'#666';
  });
}

function renderRequests(){
  const pending=S.requests.filter(r=>r.status==='pending');
  let h=`<div class="card"><div class="section-title">Village requests</div>`;
  if(!pending.length)h+=`<div class="empty">No pending requests — you're all caught up!</div>`;
  pending.forEach(r=>{
    h+=`<div class="req-row">${av(r.from,42)}<div style="flex:1;"><div style="font-size:14px;font-weight:500;">${r.from}</div><div style="font-size:12px;color:#666;margin-top:2px;">${r.from} wants to join your village</div>
    <div style="display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;">
      ${Object.entries(CIRCLES).map(([k,v])=>`<div onclick="setReqCircle(${r.id},'${k}')" id="rc-${r.id}-${k}" style="padding:3px 10px;border-radius:999px;font-size:12px;cursor:pointer;font-weight:500;border:1.5px solid ${r.circle===k?v.color:'#ddd'};background:${r.circle===k?v.bg:'#f5f5f5'};color:${r.circle===k?v.color:'#999'};">${v.label}</div>`).join('')}
    </div>
    </div>
    <div style="display:flex;gap:6px;flex-direction:column;align-items:flex-end;">
      <button class="btn btn-primary btn-sm" onclick="handleReq(${r.id},'accept')">Accept</button>
      <button class="btn btn-outline btn-sm" onclick="handleReq(${r.id},'decline')">Decline</button>
    </div></div>`;
  });
  const done=S.requests.filter(r=>r.status!=='pending');
  if(done.length){h+=`<div style="margin-top:12px;padding-top:12px;border-top:1px solid #EDE0FF;">`;done.forEach(r=>{h+=`<div style="font-size:13px;color:#999;padding:4px 0;">${r.from} — ${r.status}</div>`;});h+=`</div>`;}
  h+=`</div>`;
  document.getElementById('tab-requests').innerHTML=h;
}

function setReqCircle(id,circle){
  const r=S.requests.find(x=>x.id===id);
  if(r){r.circle=circle;}
  // update chip UI
  Object.keys(CIRCLES).forEach(k=>{
    const el=document.getElementById(`rc-${id}-${k}`);
    if(!el)return;
    const v=CIRCLES[k];
    el.style.border=`1.5px solid ${k===circle?v.color:'#ddd'}`;
    el.style.background=k===circle?v.bg:'#f5f5f5';
    el.style.color=k===circle?v.color:'#999';
  });
}

function handleReq(id,action){
  const r=S.requests.find(x=>x.id===id);
  if(r){
    r.status=action==='accept'?'accepted':'declined';
    if(action==='accept'){
      if(!r.circle)r.circle='friends';
      S.friends.push({name:r.from,kids:[],visibility:'limited',circle:r.circle,ci:S.friends.length%6});
    }
  }
  const rem=S.requests.filter(x=>x.status==='pending').length;
  const b=document.getElementById('req-badge');b.textContent=rem;if(rem===0)b.style.display='none';
  renderRequests();if(action==='accept')renderVillage();
}

function addEvent(){
  const child=document.getElementById('a-child').value.trim();
  const family=document.getElementById('a-family').value.trim();
  const date=document.getElementById('a-date').value;
  if(!family||!date){alert('Please fill in family name and date.');return;}
  S.events.push({
    id:Date.now(),
    author:document.getElementById('a-author').value.trim()||S.me,
    child,family,
    type:document.getElementById('a-type').value,
    date,
    location:document.getElementById('a-location').value.trim(),
    note:document.getElementById('a-note').value.trim(),
    visibility:document.getElementById('a-vis').value,
    attendees:[]
  });
  showTab('feed',document.querySelector('.nav-btn'));
}

let attAdults=1,attKids=0;

function openAttending(eventId){
  const e=S.events.find(x=>x.id===eventId);
  if(!e)return;
  const my=e.attendees&&e.attendees.find(a=>a.name===S.me);
  attAdults=my?my.adults:1;
  attKids=my?my.kids:0;
  document.getElementById('att-eid').value=eventId;
  document.getElementById('att-adults-val').textContent=attAdults;
  document.getElementById('att-kids-val').textContent=attKids;
  document.getElementById('att-event-info').innerHTML=`<strong>${TEMOJI[e.type]} ${e.child}'s ${TLABEL[e.type]}</strong><br/>${fmt(e.date)}${e.location?' · 📍 '+e.location:''}`;
  openModal('attending-modal');
}

function adjustAtt(field,delta){
  if(field==='adults'){attAdults=Math.max(0,attAdults+delta);document.getElementById('att-adults-val').textContent=attAdults;}
  else{attKids=Math.max(0,attKids+delta);document.getElementById('att-kids-val').textContent=attKids;}
}

function saveAttending(){
  const eid=parseInt(document.getElementById('att-eid').value);
  const e=S.events.find(x=>x.id===eid);
  if(!e)return;
  if(!e.attendees)e.attendees=[];
  const idx=e.attendees.findIndex(a=>a.name===S.me);
  if(idx>=0)e.attendees[idx]={name:S.me,adults:attAdults,kids:attKids};
  else e.attendees.push({name:S.me,adults:attAdults,kids:attKids});
  closeModal('attending-modal');
  renderFeed();
}

function removeAttending(){
  const eid=parseInt(document.getElementById('att-eid').value);
  const e=S.events.find(x=>x.id===eid);
  if(e&&e.attendees)e.attendees=e.attendees.filter(a=>a.name!==S.me);
  closeModal('attending-modal');
  renderFeed();
}

function sendInvite(){
  const name=document.getElementById('inv-name').value.trim();
  if(!name){alert('Please enter a name.');return;}
  closeModal('invite-modal');
  alert('Invite sent to '+name+'! They\'ll receive a link to join your village.');
}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

function renderUserChips(){
  document.getElementById('user-chips').innerHTML=S.users.map(u=>`<div onclick="setPending('${u}')" id="uc-${u}" style="padding:6px 14px;border-radius:999px;font-size:13px;cursor:pointer;font-weight:500;border:1.5px solid ${u===S.pendingUser?'#8B5CC8':'#ddd'};background:${u===S.pendingUser?'#F0E8FF':'#f5f5f5'};color:${u===S.pendingUser?'#3D1A6E':'#666'};">${u}</div>`).join('');
}
function setPending(name){S.pendingUser=name;renderUserChips();}
function addNewUser(){const n=document.getElementById('nu-name').value.trim();if(n&&!S.users.includes(n)){S.users.push(n);S.pendingUser=n;}document.getElementById('nu-name').value='';renderUserChips();}
function confirmUser(){if(S.pendingUser)S.me=S.pendingUser;closeModal('user-modal');document.getElementById('top-name').textContent=S.me;document.getElementById('top-av').textContent=inits(S.me);renderGifts();}

['join-gift-modal','thankyou-modal','invite-modal','attending-modal','user-modal'].forEach(id=>{
  const el=document.getElementById(id);
  if(el)el.addEventListener('click',function(e){if(e.target===this)closeModal(id);});
});

function showTab(tab,btn){
  ['feed','village','gifts','add','requests'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===tab?'block':'none';});
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  if(tab==='feed')renderFeed();
  else if(tab==='village')renderVillage();
  else if(tab==='gifts')renderGifts();
  else if(tab==='add')renderAdd();
  else if(tab==='requests')renderRequests();
}

S.pendingUser=S.me;
renderUserChips();
renderFeed();
</script>
<script>
if('serviceWorker' in navigator){
  const sw=`
    const CACHE='loopd-v1';
    const ASSETS=['/'];
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
    self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));
  `;
  const blob=new Blob([sw],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}
const manifest={
  name:'Loopd',
  short_name:'Loopd',
  description:'Stay in the loop with your village',
  start_url:'/',
  display:'standalone',
  background_color:'#FAF8FF',
  theme_color:'#8B5CC8',
  icons:[{src:`data:image/svg+xml,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="#8B5CC8"/><circle cx="32" cy="50" r="16" fill="#C9A8E8"/><circle cx="68" cy="50" r="16" fill="#6B3FA0"/></svg>')}`,sizes:'any',type:'image/svg+xml'}]
};
const mblob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
const murl=URL.createObjectURL(mblob);
const link=document.createElement('link');
link.rel='manifest';link.href=murl;
document.head.appendChild(link);
</script>
